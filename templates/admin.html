<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - NexusBank</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav>
        <div class="container nav-content">
            <div class="logo">NexusBank Admin</div>
            <div class="nav-links">
                <span id="welcomeText" class="text-muted" style="margin-right: 1.5rem;"></span>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 2rem;">
        <div class="stats-grid">
            <div class="stat-card">
                <h3 class="text-muted" style="font-size: 1rem;">Total Users</h3>
                <div class="stat-value" id="totalUsersCount">0</div>
            </div>
            <div class="stat-card">
                <h3 class="text-muted" style="font-size: 1rem;">Total Accounts</h3>
                <div class="stat-value" id="totalAccountsCount">0</div>
            </div>
            <div class="stat-card">
                <h3 class="text-muted" style="font-size: 1rem;">System Balance</h3>
                <div class="stat-value" id="totalSystemBalance">$0.00</div>
            </div>
        </div>

        <div class="card mb-3">
            <h2 class="mb-2">Manage Accounts</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Account #</th>
                            <th>Type</th>
                            <th>Balance</th>
                            <th>Created At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminAccounts">
                        <!-- Rendered dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        let currentUser = null;

        async function init() {
            if (!getToken()) {
                window.location.href = '/';
                return;
            }

            try {
                currentUser = await fetchAPI('/users/me');
                if (currentUser.role !== 'admin') {
                    window.location.href = '/dashboard';
                    return;
                }
                document.getElementById('welcomeText').textContent = `Admin: ${currentUser.username}`;
                await loadAdminData();
            } catch (err) {
                console.error(err);
            }
        }

        async function loadAdminData() {
            try {
                const users = await fetchAPI('/admin/users');
                const accounts = await fetchAPI('/admin/accounts');
                
                document.getElementById('totalUsersCount').textContent = users.length;
                document.getElementById('totalAccountsCount').textContent = accounts.length;
                
                const totalBalance = accounts.reduce((sum, acc) => sum + acc.balance, 0);
                document.getElementById('totalSystemBalance').textContent = formatCurrency(totalBalance);

                const tbody = document.getElementById('adminAccounts');
                tbody.innerHTML = '';
                
                if (accounts.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No accounts found</td></tr>';
                    return;
                }

                accounts.forEach(acc => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><span style="font-size: 0.8rem; color: var(--text-muted);">${acc.user_id}</span></td>
                        <td>${acc.account_number}</td>
                        <td><span class="badge" style="background: var(--bg-input);">${acc.account_type}</span></td>
                        <td>${formatCurrency(acc.balance)}</td>
                        <td>${formatDate(acc.created_at)}</td>
                        <td>
                            <button class="btn btn-danger" style="padding: 0.25rem 0.75rem; font-size: 0.8rem; width: auto;" onclick="deleteAccount('${acc.id}')">Delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error(err);
            }
        }

        async function deleteAccount(id) {
            if (confirm("Are you sure you want to delete this account and all its transactions? This action cannot be undone.")) {
                try {
                    await fetchAPI(`/admin/accounts/${id}`, { method: 'DELETE' });
                    showNotification('Account deleted successfully');
                    loadAdminData();
                } catch (err) {}
            }
        }

        init();
    </script>
</body>
</html>
